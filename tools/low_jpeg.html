<h2>鍥惧儚鍘嬬缉 - 褰╄壊鏂眰椋?/h2>
<p>涓婁紶浠绘剰鍥剧墖锛屽帇缂╀负鏋佷綆璐ㄩ噺 JPEG 鍥惧儚锛屽舰鎴愮嫭鐗圭殑椹禌鍏嬩吉褰变笌鑹插僵閿欎綅缇庢劅銆?/p>

<div class="container">
  <input type="file" id="imageInput" accept="image/*">
  <br><br>
  <button onclick="compressImage()">鍘嬬缉骞剁敓鎴愰瑙?/button>
  <br><br>
  <canvas id="previewCanvas" class="low-preview-canvas"></canvas>
  <br>
  <button id="downloadBtn" class="is-hidden">涓嬭浇鍘嬬缉鍥惧儚</button>
</div>

<script>
function compressImage() {
  const fileInput = document.getElementById('imageInput');
  const canvas = document.getElementById('previewCanvas');
  const downloadBtn = document.getElementById('downloadBtn');

  if (!fileInput.files || fileInput.files.length === 0) {
    alert('璇峰厛閫夋嫨涓€寮犲浘鐗?);
    return;
  }

  const file = fileInput.files[0];
  const img = new Image();
  const reader = new FileReader();

  reader.onload = function (e) {
    img.onload = function () {
      const ctx = canvas.getContext('2d');
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);

      const compressedDataURL = canvas.toDataURL('image/jpeg', 0.03);
      const compressedImg = new Image();
      compressedImg.src = compressedDataURL;

      compressedImg.onload = function () {
        canvas.width = compressedImg.width;
        canvas.height = compressedImg.height;
        ctx.drawImage(compressedImg, 0, 0);
        canvas.style.display = 'block';

        downloadBtn.onclick = function () {
          const a = document.createElement('a');
          a.href = compressedDataURL;
          a.download = 'compressed-glitch.jpg';
          a.click();
        };
        downloadBtn.style.display = 'inline-block';
      };
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
</script>
